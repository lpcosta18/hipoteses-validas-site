<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipóteses Válidas - Contabilidade em Torres Vedras</title>
    <meta name="description" content="Contabilidade e Fiscalidade em Torres Vedras">
    <link rel="icon" type="image/png" href="assets/logo/logo-hv-favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!--#include virtual="header.html" -->

    <main>
        <section class="page-header">
            <div class="container">
                <h1>Contactos</h1>
            </div>
        </section>

        <section class="contact-section">
            <div class="container contact-container">
                <div class="contact-info">
                    <div class="info-card">
                        <h3>Informação prática</h3>
                        
                        <div class="info-item">
                            <span class="info-icon">📞</span>
                            <div>
                                <strong>Telefone</strong>
                                <a href="tel:968481817">968 481 817</a>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <span class="info-icon">✉️</span>
                            <div>
                                <strong>Email</strong>
                                <a href="mailto:geral@hipoteses-validas.pt">geral@hipoteses-validas.pt</a>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <span class="info-icon">📍</span>
                            <div>
                                <strong>Morada</strong>
                                <address>Rua Joaquim Maria Simões, 1, 2560-281 Torres Vedras</address>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <span class="info-icon">🕒</span>
                            <div>
                                <strong>Horário</strong>
                                <p>Segunda a Sexta: 9h00 — 13h00 | 14h00 — 18h00</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="map-container">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3081.123456789!2d-9.258456!3d39.123456!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd186e1e2d5b2b7f%3A0x123456789abcdef!2sRua%20Joaquim%20Maria%20Sim%C3%B5es%2C%201%2C%202560-281%20Torres%20Vedras!5e0!3m2!1spt-PT!2spt!4v1234567890" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
                
                <div class="contact-form">
                    <h3>Envie-nos uma mensagem</h3>
                    
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="nome">Nome completo *</label>
                            <input type="text" id="nome" name="nome" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="telemovel">Telemóvel</label>
                            <input type="tel" id="telemovel" name="telemovel">
                        </div>
                        
                        <div class="form-group">
                            <label for="assunto">Assunto</label>
                            <select id="assunto" name="assunto">
                                <option value="contabilidade">Contabilidade</option>
                                <option value="fiscalidade">Fiscalidade</option>
                                <option value="recursos-humanos">Recursos Humanos</option>
                                <option value="seguros">Mediação de Seguros</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="mensagem">Mensagem *</label>
                            <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-submit">Enviar mensagem</button>
                        <p class="form-note">* Campos obrigatórios</p>
                    </form>
                    
                    <div id="form-success" class="form-message success" style="display: none;">
                        ✅ Mensagem enviada com sucesso!
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!--#include virtual="footer.html" -->
    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
